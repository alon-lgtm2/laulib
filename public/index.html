<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #F8F4EE; }
    bavua-library { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <bavua-library id="library"></bavua-library>
  <script src="./bavua-library.js"></script>
  <script>
    // Receive CMS data from Wix parent via postMessage
    window.addEventListener('message', function(event) {
      if (event.data && event.data.type === 'LIBRARY_DATA') {
        var el = document.getElementById('library');
        if (el) el.setAttribute('library-data', JSON.stringify(event.data.payload));
      }
    });
  </script>
</body>
</html>
